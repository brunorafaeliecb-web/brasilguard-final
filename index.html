<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Brasilguard [BIOMIMETICS 2026]</title>
    <style>
        :root {
            --base-bg: #09121f; --teal-gradient: linear-gradient(135deg, #1abc9c 0%, #2980b9 100%); 
            --emerald-low: #10a37f; --cyan-low: #0076a3; --glass: rgba(255, 255, 255, 0.03); 
            --text-main: #f4f7f6; --text-sub: #b0bec5;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--base-bg); color: var(--text-main); margin: 0; padding: 20px; min-height: 100vh; }
        .l-container { max-width: 1200px; margin: 0 auto; }
        .box-padrao { background: var(--glass); padding: 30px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
        .nav-abas { display: flex; gap: 15px; margin-bottom: 30px; }
        .btn-aba { background: rgba(0,0,0,0.3); color: var(--text-sub); border: 1px solid rgba(255,255,255,0.1); padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-aba.ativa { background: var(--teal-gradient); color: white; border: none; }
        .aba-conteudo { display: none; }
        .aba-conteudo.ativa { display: block; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: var(--base-bg); margin: 5% auto; padding: 30px; border-radius: 16px; width: 90%; max-width: 500px; border: 1px solid #1abc9c; }
        .btn-acao { background: var(--teal-gradient); color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div id="modal-os" class="modal">
        <div class="modal-content">
            <h3 style="color:#1abc9c">📋 Ordem de Serviço</h3>
            <p id="modal-cliente"></p>
            <input type="text" id="os-problema" placeholder="Problema Relatado">
            <textarea id="os-servico" placeholder="Solução Técnica" style="width:100%; height:80px; margin-bottom:10px;"></textarea>
            <button class="btn-acao" onclick="salvarOS()">💾 Salvar</button>
            <button class="btn-acao" style="background: #8e44ad; margin-top:10px;" onclick="gerarRelatorioIA(event)">✨ Gerar Relatório IA</button>
            <button class="btn-acao" style="background: #555; margin-top:10px;" onclick="fecharModal()">Fechar</button>
        </div>
    </div>

    <div id="tela-sistema" class="l-container">
        <h1>BRASILGUARD SISTEMAS</h1>
        <div class="nav-abas">
            <button class="btn-aba ativa" onclick="mudarAba('hunter', this)">🎯 Radar & Hunter</button>
            <button class="btn-aba" onclick="mudarAba('servicedesk', this)">🛠️ Service Desk</button>
        </div>

        <div id="aba-hunter" class="aba-conteudo ativa">
            <div class="box-padrao">
                <h3>📋 Leads (Cofre)</h3>
                <table id="tabela-leads"></table>
            </div>
        </div>

        <div id="aba-servicedesk" class="aba-conteudo">
            <div class="box-padrao">
                <h3>🏢 Clientes Ativos</h3>
                <table>
                    <tr><td>Condomínio Exemplo</td><td><button onclick="abrirModalOS('Condomínio Exemplo')">+ O.S.</button></td></tr>
                </table>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = 'https://brasilguard-final.onrender.com';
        window.clienteAtualOS = "";

        // FUNÇÃO DE MUDAR ABAS (DEFINIDA NO TOPO)
        function mudarAba(abaId, btn) {
            document.querySelectorAll('.aba-conteudo').forEach(a => a.classList.remove('ativa'));
            document.querySelectorAll('.btn-aba').forEach(b => b.classList.remove('ativa'));
            document.getElementById('aba-' + abaId).classList.add('ativa');
            btn.classList.add('ativa');
        }

        function abrirModalOS(nome) {
            window.clienteAtualOS = nome;
            document.getElementById('modal-cliente').innerText = "Cliente: " + nome;
            document.getElementById('modal-os').style.display = "block";
        }

        function fecharModal() { document.getElementById('modal-os').style.display = "none"; }

        async function gerarRelatorioIA(event) {
            if(event) event.preventDefault();
            const prob = document.getElementById('os-problema').value;
            const serv = document.getElementById('os-servico').value;
            const btn = event.target;
            
            btn.innerText = "⏳ PROCESSANDO...";
            btn.disabled = true;

            try {
                const res = await fetch(`${BASE_URL}/api/hunter/gerar-os`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cliente: window.clienteAtualOS, problema: prob, servico: serv })
                });

                const dados = await res.json(); // AGORA 'DADOS' ESTÁ DEFINIDO AQUI

                if(dados.sucesso) {
                    window.open(`https://wa.me/?text=${encodeURIComponent(dados.relatorio)}`, '_blank');
                    fecharModal();
                } else {
                    alert("Erro: " + dados.erro);
                }
            } catch (e) {
                alert("Erro de conexão com o Render.");
            } finally {
                btn.innerText = "✨ Gerar Relatório IA";
                btn.disabled = false;
            }
        }

        function salvarOS() { alert("Salvo!"); fecharModal(); }
    </script>
</body>
</html>
