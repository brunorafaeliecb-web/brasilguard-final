<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Brasilguard [BIOMIMETICS 2026]</title>
    <style>
        :root {
            --base-bg: #09121f; --teal-gradient: linear-gradient(135deg, #1abc9c 0%, #2980b9 100%); 
            --glass: rgba(255, 255, 255, 0.03); --text-main: #f4f7f6; --text-sub: #b0bec5;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--base-bg); margin: 0; padding: 20px; color: var(--text-main); }
        .l-container { max-width: 1200px; margin: 0 auto; }
        .box-padrao { background: var(--glass); padding: 30px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
        .btn-aba { background: rgba(0,0,0,0.3); color: var(--text-sub); border: 1px solid rgba(255,255,255,0.1); padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-aba.ativa { background: var(--teal-gradient); color: white; border: none; box-shadow: 0 5px 15px rgba(26, 188, 156, 0.3); }
        .aba-conteudo { display: none; }
        .aba-conteudo.ativa { display: block; }
        .btn-acao { background: var(--teal-gradient); color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .modal-content { background: var(--base-bg); border: 1px solid #1abc9c; margin: 5% auto; padding: 30px; border-radius: 16px; width: 90%; max-width: 500px; }
        input, textarea { width: 100%; padding: 12px; background: rgba(0,0,0,0.2); border: 1px solid #1abc9c; border-radius: 8px; color: white; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="modal-os" class="modal">
        <div class="modal-content">
            <h3 style="color:#1abc9c">📋 Ordem de Serviço</h3>
            <p id="modal-cliente" style="color:var(--text-sub)"></p>
            <input type="text" id="os-problema" placeholder="Problema Relatado">
            <textarea id="os-servico" placeholder="Solução Técnica" style="height: 100px;"></textarea>
            <button class="btn-acao" onclick="salvarOS()">💾 Salvar Registro</button>
            <button class="btn-acao" id="btn-ia" style="background: #8e44ad;" onclick="gerarRelatorioIA(event)">✨ Gerar Relatório IA (Gemini 3)</button>
            <button class="btn-acao" style="background: #555;" onclick="fecharModal()">Fechar</button>
        </div>
    </div>

    <div id="tela-sistema" class="l-container">
        <h1 style="background: var(--teal-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">BRASILGUARD SISTEMAS</h1>
        
        <div style="display:flex; gap:10px; margin: 20px 0;">
            <button class="btn-aba ativa" id="aba-hunter-btn" onclick="mudarAba('hunter', this)">🎯 Radar & Hunter</button>
            <button class="btn-aba" id="aba-servicedesk-btn" onclick="mudarAba('servicedesk', this)">🛠️ Service Desk</button>
        </div>

        <div id="aba-hunter" class="aba-conteudo ativa">
            <div class="box-padrao"><h3>🎯 Radar Hunter</h3><p>Monitorando leads ativos...</p></div>
        </div>

        <div id="aba-servicedesk" class="aba-conteudo">
            <div class="box-padrao">
                <h3>🏢 Gestão de Chamados</h3>
                <button class="btn-aba" style="padding:10px 20px;" onclick="abrirModalOS('Condomínio Exemplo')">+ Nova O.S.</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        const firebaseConfig = {
            apiKey: "AIzaSyABi8se1JZzGNZtsYds6ARxkEAzuAQnbTo",
            authDomain: "brasilguard-cofre.firebaseapp.com",
            projectId: "brasilguard-cofre",
            storageBucket: "brasilguard-cofre.firebasestorage.app",
            messagingSenderId: "948181992816",
            appId: "1:948181992816:web:dc02c06f6d17a078cefbb5"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        onAuthStateChanged(auth, (user) => { if(!user) window.location.replace("login.html"); });
    </script>

    <script>
        const BASE_URL = 'https://brasilguard-final.onrender.com';
        window.clienteAtualOS = "";

        // NAVEGAÇÃO (DEFINIDA NO TOPO PARA NÃO TRAVAR)
        function mudarAba(id, btn) {
            document.querySelectorAll('.aba-conteudo').forEach(a => a.classList.remove('ativa'));
            document.querySelectorAll('.btn-aba').forEach(b => b.classList.remove('ativa'));
            document.getElementById('aba-' + id).classList.add('ativa');
            btn.classList.add('ativa');
        }

        function abrirModalOS(nome) {
            window.clienteAtualOS = nome;
            document.getElementById('modal-cliente').innerText = "Cliente: " + nome;
            document.getElementById('modal-os').style.display = "block";
        }

        function fecharModal() { document.getElementById('modal-os').style.display = "none"; }

        async function gerarRelatorioIA(event) {
            if(event) event.preventDefault();
            const prob = document.getElementById('os-problema').value;
            const serv = document.getElementById('os-servico').value;
            const btn = document.getElementById('btn-ia');

            btn.innerText = "⏳ IA ESCREVENDO...";
            btn.disabled = true;

            try {
                const res = await fetch(`${BASE_URL}/api/hunter/gerar-os`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cliente: window.clienteAtualOS, problema: prob, servico: serv })
                });

                const dados = await res.json(); // A VARIÁVEL DADOS É CRIADA AQUI

                if(dados.sucesso) {
                    window.open(`https://wa.me/?text=${encodeURIComponent(dados.relatorio)}`, '_blank');
                    fecharModal();
                } else { alert("IA Falhou no Render."); }
            } catch (e) { alert("Erro de conexão com o Render."); }
            finally { btn.innerText = "✨ Gerar Relatório IA (Gemini 3)"; btn.disabled = false; }
        }

        function salvarOS() { alert("Salvo!"); fecharModal(); }
    </script>
</body>
</html>
