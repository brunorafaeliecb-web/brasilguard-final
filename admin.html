<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALA DE COMANDO - Brasilguard Master</title>
    <style>
        :root { --base-bg: #050a10; --glass: rgba(255, 255, 255, 0.05); --text-main: #f4f7f6; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--base-bg); color: var(--text-main);
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0;
            display: none; /* Escondido até provar que é você */
        }
        .admin-box {
            background: var(--glass); padding: 40px; border-radius: 12px;
            border: 1px solid rgba(243, 156, 18, 0.4); width: 100%; max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
        }
        .admin-box h2 { color: #f39c12; text-transform: uppercase; letter-spacing: 2px; margin-top: 0; }
        .admin-box p { color: #b0bec5; margin-bottom: 25px; font-size: 0.9rem; }
        
        .input-group { text-align: left; margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.85rem; color: #f39c12; margin-bottom: 5px; font-weight: bold; }
        input {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(243, 156, 18, 0.3);
            border-radius: 6px; color: white; font-family: inherit; font-size: 1rem; box-sizing: border-box;
        }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        input:focus { outline: none; border-color: #f39c12; }
        
        button {
            width: 100%; background: #f39c12; color: #111; padding: 15px; border: none;
            border-radius: 6px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }
        button:hover { background: #e67e22; transform: translateY(-2px); }
        #mensagem { margin-top: 20px; font-weight: bold; font-size: 0.9rem; display: none; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2>Painel Master 👑</h2>
        <p>Liberação manual de licenças do Brasilguard Hunter.</p>

        <div class="input-group">
            <label>ID do Cliente (UID)</label>
            <input type="text" id="uid-cliente" placeholder="Cole o ID que o cliente mandou no Zap" required>
        </div>

        <div class="input-group">
            <label>Nova Data de Vencimento</label>
            <input type="date" id="data-vencimento" required>
        </div>

        <button onclick="liberarAcesso()" id="btn-liberar">Liberar Acesso no Banco</button>
        <div id="mensagem"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // COLOQUE O SEU FIREBASE CONFIG AQUI!
        const firebaseConfig = {
            apiKey: "COLE_AQUI",
            authDomain: "COLE_AQUI",
            projectId: "COLE_AQUI",
            storageBucket: "COLE_AQUI",
            messagingSenderId: "COLE_AQUI",
            appId: "COLE_AQUI"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // O SEU E-MAIL DE CHEFE (A CHAVE DA PORTA)
        const EMAIL_MASTER = "brunorafael.iecb@gmail.com"; 

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === EMAIL_MASTER) {
                // É o chefe! Mostra o painel.
                document.body.style.display = "flex";
            } else {
                // Não é o chefe ou não está logado. Chuta pra fora!
                window.location.replace("login.html");
            }
        });

        window.liberarAcesso = async function() {
            const uid = document.getElementById('uid-cliente').value.trim();
            const data = document.getElementById('data-vencimento').value;
            const msg = document.getElementById('mensagem');
            const btn = document.getElementById('btn-liberar');

            if (!uid || !data) {
                msg.style.display = "block"; msg.style.color = "#e74c3c"; msg.innerText = "Preencha os dois campos!";
                return;
            }

            btn.innerText = "Injetando no banco..."; btn.disabled = true;

            try {
                // Cria ou atualiza a assinatura do cliente
                await setDoc(doc(db, "assinaturas", uid), {
                    vencimento: data
                }, { merge: true });

                msg.style.display = "block"; msg.style.color = "#2ecc71"; msg.innerText = "✅ Acesso liberado com sucesso!";
                document.getElementById('uid-cliente').value = ""; // Limpa para o próximo
            } catch (error) {
                msg.style.display = "block"; msg.style.color = "#e74c3c"; msg.innerText = "Erro: " + error.message;
            } finally {
                btn.innerText = "Liberar Acesso no Banco"; btn.disabled = false;
            }
        }
    </script>
</body>
</html>
